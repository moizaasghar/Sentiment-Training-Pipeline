name: Build image for training pipeline

on:
    push:
        branches: [ main ]

jobs:
    build-image:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Build the Docker image
              run: docker build -t moizasghar/bert-tiny-sentiment:latest .
            
    push-image:
        needs: build-image
        runs-on: ubuntu-latest

        steps:
            - name: Login to Docker Hub
              run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            - name: Push the Docker image
              run: docker push moizasghar/bert-tiny-sentiment:latest
    

        